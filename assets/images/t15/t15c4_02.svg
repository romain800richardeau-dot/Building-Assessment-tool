<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 530" role="img" aria-labelledby="svg-choix-title svg-choix-desc" style="font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; max-width: 100%; height: auto;">
  <title id="svg-choix-title">Lot dédié ou intégration lot par lot ?</title>
  <desc id="svg-choix-desc">Deux colonnes comparant les cinq signaux en faveur d'un lot réemploi dédié et les quatre situations où une intégration lot par lot suffit.</desc>

  <text x="380" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">Lot dédié ou intégration lot par lot ?</text>
  <text x="380" y="40" text-anchor="middle" font-size="11" fill="#64748B" font-style="italic">Deux montages valides, le bon choix dépend du contexte</text>

  <!-- ========== COLONNE GAUCHE : LOT DÉDIÉ (bleu) ========== -->
  <rect x="28" y="58" width="344" height="440" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <path d="M28 66 Q28 58 36 58 L364 58 Q372 58 372 66 L372 100 L28 100 Z" fill="#1D4ED8"/>
  <text x="200" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="1.5">LOT DÉDIÉ S'IMPOSE</text>
  <text x="200" y="94" text-anchor="middle" font-size="10" fill="#DBEAFE" letter-spacing="0.5">5 signaux convergents</text>

  <!-- Card 1 : Ampleur -->
  <g transform="translate(40, 110)">
    <rect x="0" y="0" width="320" height="68" rx="6" fill="#fff" stroke="#CBD5E1"/>
    <circle cx="24" cy="34" r="15" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>
    <g transform="translate(24, 34)" stroke="#1E3A8A" stroke-width="1.5" fill="none">
      <rect x="-6" y="-6" width="12" height="4"/>
      <rect x="-6" y="-1" width="12" height="4"/>
      <rect x="-6" y="4" width="12" height="4"/>
    </g>
    <text x="54" y="26" font-size="12" font-weight="700" fill="#1E3A8A">1 · Ampleur du projet</text>
    <text x="54" y="44" font-size="10" fill="#475569">Gros ANRU, multi-bâtiments : la coordination</text>
    <text x="54" y="58" font-size="10" fill="#475569">transversale ne se répartit plus sans duplication.</text>
  </g>

  <!-- Card 2 : Nombre de matériaux -->
  <g transform="translate(40, 186)">
    <rect x="0" y="0" width="320" height="68" rx="6" fill="#fff" stroke="#CBD5E1"/>
    <circle cx="24" cy="34" r="15" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>
    <g transform="translate(24, 34)" stroke="#1E3A8A" stroke-width="1" fill="none">
      <rect x="-7" y="-7" width="4" height="4"/>
      <rect x="-2" y="-7" width="4" height="4"/>
      <rect x="3" y="-7" width="4" height="4"/>
      <rect x="-7" y="-2" width="4" height="4"/>
      <rect x="-2" y="-2" width="4" height="4"/>
      <rect x="3" y="-2" width="4" height="4"/>
      <rect x="-7" y="3" width="4" height="4"/>
      <rect x="-2" y="3" width="4" height="4"/>
      <rect x="3" y="3" width="4" height="4"/>
    </g>
    <text x="54" y="26" font-size="12" font-weight="700" fill="#1E3A8A">2 · Nombreux matériaux concernés</text>
    <text x="54" y="44" font-size="10" fill="#475569">Si dix lots doivent chacun apprendre à sourcer,</text>
    <text x="54" y="58" font-size="10" fill="#475569">autant centraliser la compétence.</text>
  </g>

  <!-- Card 3 : Filières peu structurées -->
  <g transform="translate(40, 262)">
    <rect x="0" y="0" width="320" height="68" rx="6" fill="#fff" stroke="#CBD5E1"/>
    <circle cx="24" cy="34" r="15" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>
    <g transform="translate(24, 34)" stroke="#1E3A8A" stroke-width="1.5" fill="none">
      <circle cx="-6" cy="-4" r="2.5"/>
      <circle cx="6" cy="-4" r="2.5"/>
      <circle cx="0" cy="6" r="2.5"/>
      <line x1="-4" y1="-4" x2="4" y2="-4" stroke-dasharray="1.5 1.5"/>
    </g>
    <text x="54" y="26" font-size="12" font-weight="700" fill="#1E3A8A">3 · Filières locales peu structurées</text>
    <text x="54" y="44" font-size="10" fill="#475569">Aucune entreprise classique du territoire ne</text>
    <text x="54" y="58" font-size="10" fill="#475569">maîtrise le réemploi : importer un spécialiste.</text>
  </g>

  <!-- Card 4 : Ambition élevée -->
  <g transform="translate(40, 338)">
    <rect x="0" y="0" width="320" height="68" rx="6" fill="#fff" stroke="#CBD5E1"/>
    <circle cx="24" cy="34" r="15" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>
    <g transform="translate(24, 34)" stroke="#1E3A8A" stroke-width="1.5" fill="none">
      <circle cx="0" cy="0" r="7"/>
      <circle cx="0" cy="0" r="3" fill="#1E3A8A"/>
      <line x1="4" y1="-4" x2="9" y2="-9" stroke-width="2"/>
      <polyline points="6,-9 9,-9 9,-6"/>
    </g>
    <text x="54" y="26" font-size="12" font-weight="700" fill="#1E3A8A">4 · Ambition élevée (20 % et plus)</text>
    <text x="54" y="44" font-size="10" fill="#475569">L'objectif n'est atteint que si quelqu'un est payé</text>
    <text x="54" y="58" font-size="10" fill="#475569">pour s'en occuper à temps plein.</text>
  </g>

  <!-- Card 5 : Filière ESS -->
  <g transform="translate(40, 414)">
    <rect x="0" y="0" width="320" height="68" rx="6" fill="#fff" stroke="#CBD5E1"/>
    <circle cx="24" cy="34" r="15" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>
    <g transform="translate(24, 34)" stroke="#1E3A8A" stroke-width="1.5" fill="none">
      <circle cx="-5" cy="-2" r="2.5"/>
      <circle cx="5" cy="-2" r="2.5"/>
      <circle cx="0" cy="4" r="2.5"/>
      <path d="M-5,1 Q-5,6 -2,7 M5,1 Q5,6 2,7 M-2,7 Q0,8 2,7"/>
    </g>
    <text x="54" y="26" font-size="12" font-weight="700" fill="#1E3A8A">5 · Filière ESS locale à développer</text>
    <text x="54" y="44" font-size="10" fill="#475569">Emplois d'insertion, magasin de chantier ouvert</text>
    <text x="54" y="58" font-size="10" fill="#475569">au territoire, écosystème pérenne.</text>
  </g>

  <!-- ========== COLONNE DROITE : LOT PAR LOT (slate) ========== -->
  <rect x="388" y="58" width="344" height="364" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <path d="M388 66 Q388 58 396 58 L724 58 Q732 58 732 66 L732 100 L388 100 Z" fill="#475569"/>
  <text x="560" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="1.5">INTÉGRATION LOT PAR LOT SUFFIT</text>
  <text x="560" y="94" text-anchor="middle" font-size="10" fill="#CBD5E1" letter-spacing="0.5">4 situations</text>

  <!-- Card 1 : Peu de matériaux -->
  <g transform="translate(400, 110)">
    <rect x="0" y="0" width="320" height="68" rx="6" fill="#fff" stroke="#CBD5E1"/>
    <circle cx="24" cy="34" r="15" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
    <g transform="translate(24, 34)" stroke="#475569" stroke-width="1.5" fill="none">
      <rect x="-5" y="-5" width="10" height="10"/>
    </g>
    <text x="54" y="26" font-size="12" font-weight="700" fill="#334155">1 · Peu de matériaux, 1 ou 2 lots</text>
    <text x="54" y="44" font-size="10" fill="#475569">Ex. : seules les menuiseries extérieures sont</text>
    <text x="54" y="58" font-size="10" fill="#475569">réemployées. Le lot menuiserie s'en charge.</text>
  </g>

  <!-- Card 2 : Filière mature -->
  <g transform="translate(400, 186)">
    <rect x="0" y="0" width="320" height="68" rx="6" fill="#fff" stroke="#CBD5E1"/>
    <circle cx="24" cy="34" r="15" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
    <g transform="translate(24, 34)" stroke="#475569" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="-5,0 -1,4 6,-5"/>
    </g>
    <text x="54" y="26" font-size="12" font-weight="700" fill="#334155">2 · Filière locale mature</text>
    <text x="54" y="44" font-size="10" fill="#475569">Un fournisseur professionnel vend le produit</text>
    <text x="54" y="58" font-size="10" fill="#475569">reconditionné prêt à l'emploi.</text>
  </g>

  <!-- Card 3 : Budget contraint -->
  <g transform="translate(400, 262)">
    <rect x="0" y="0" width="320" height="68" rx="6" fill="#fff" stroke="#CBD5E1"/>
    <circle cx="24" cy="34" r="15" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
    <text x="24" y="40" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">€</text>
    <text x="54" y="26" font-size="12" font-weight="700" fill="#334155">3 · Budget contraint</text>
    <text x="54" y="44" font-size="10" fill="#475569">Un lot dédié ajoute un poste de coût que</text>
    <text x="54" y="58" font-size="10" fill="#475569">toutes les opérations ne peuvent pas absorber.</text>
  </g>

  <!-- Card 4 : Entreprise expérimentée -->
  <g transform="translate(400, 338)">
    <rect x="0" y="0" width="320" height="68" rx="6" fill="#fff" stroke="#CBD5E1"/>
    <circle cx="24" cy="34" r="15" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
    <g transform="translate(24, 34)" stroke="#475569" stroke-width="1.5" fill="none" stroke-linejoin="round">
      <polygon points="0,-6 1.8,-1.8 6,-1.8 2.6,1.2 3.8,6 0,3.2 -3.8,6 -2.6,1.2 -6,-1.8 -1.8,-1.8" fill="#F1F5F9"/>
    </g>
    <text x="54" y="26" font-size="12" font-weight="700" fill="#334155">4 · Entreprise déjà expérimentée</text>
    <text x="54" y="44" font-size="10" fill="#475569">Références solides en réemploi : lui confier</text>
    <text x="54" y="58" font-size="10" fill="#475569">la mission est plus simple qu'un lot séparé.</text>
  </g>

  <!-- Pastille centrale OU -->
  <circle cx="380" cy="79" r="20" fill="#fff" stroke="#1D4ED8" stroke-width="2"/>
  <text x="380" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A8A" letter-spacing="1">OU</text>

  <!-- Note de bas -->
  <text x="380" y="518" text-anchor="middle" font-size="10" fill="#64748B" font-style="italic">Compter les signaux qui s'appliquent à votre opération oriente le choix.</text>
</svg>
